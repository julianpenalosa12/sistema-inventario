<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-4">

<h2>Gestión de Usuarios</h2>

<form action="/usuarios/crear" method="POST" class="row g-3">

<div class="col-md-3">
<input type="text" name="nombre" class="form-control" placeholder="Nombre">
</div>

<div class="col-md-3">
<input type="email" name="email" class="form-control" placeholder="Email">
</div>

<div class="col-md-3">
<input type="password" name="password" class="form-control" placeholder="Contraseña">
</div>

<div class="col-md-2">
<select name="rol" class="form-select">
<option value="admin">Admin</option>
<option value="usuario">Usuario</option>
</select>
</div>

<div class="col-md-1">
<button class="btn btn-primary">Crear</button>
</div>

</form>

<hr>

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Rol</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

{% for u in usuarios %}

<tr>
<td>{{u.id_usuario}}</td>
<td>{{u.nombre}}</td>
<td>{{u.email}}</td>
<td>{{u.rol}}</td>

<td>

<a class="btn btn-warning btn-sm" href="/usuarios/editar/{{u.id_usuario}}">Editar</a>

<a class="btn btn-danger btn-sm" href="/usuarios/eliminar/{{u.id_usuario}}">Eliminar</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
