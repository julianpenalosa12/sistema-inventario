<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Usuarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Sidebar */
.sidebar {
    height: 100vh;
    width: 250px;
    position: fixed;
    top: 0;
    left: -250px;
    background-color: #212529;
    padding-top: 60px;
    transition: 0.3s;
}

.sidebar a {
    padding: 10px 20px;
    display: block;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background-color: #343a40;
}

/* Contenido */
.content {
    margin-left: 0;
    transition: 0.3s;
    padding: 20px;
}

.sidebar.active {
    left: 0;
}

.content.active {
    margin-left: 250px;
}

.navbar {
    position: relative;
    z-index: 1000;
}
</style>

</head>

<body>

<!--navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        
        <!-- Botón menú -->
        <button id="menuBtn" class="btn btn-outline-light" onclick="toggleSidebar()">
        ☰
        </button>

        <!-- Nombre app -->
        <span class="navbar-brand mb-0 h1">SIWI</span>

    </div>
</nav>

<!-- 📂 SIDEBAR -->
<div id="sidebar" class="sidebar">

    <a href="/dashboard">🏠 Inicio</a>
    <a href="/usuarios">👤 Gestionar Usuarios</a>
    <a href="/categorias">🏷 Gestionar Categorías</a>
    <a href="/productos">📦 Productos</a>
    <a href="#">📊 Reportes</a>
    <a href="/logout">🚪 Cerrar sesión</a>

</div>

<!-- 📄 CONTENIDO -->
<div id="content" class="content">

<div class="container mt-4">

<h2>Gestión de Usuarios</h2>

<form action="/usuarios/crear" method="POST" class="row g-3">

<div class="col-md-3">
<input type="text" name="nombre" class="form-control" placeholder="Nombre">
</div>

<div class="col-md-3">
<input type="email" name="email" class="form-control" placeholder="Email">
</div>

<div class="col-md-3">
<input type="password" name="password" class="form-control" placeholder="Contraseña">
</div>

<div class="col-md-2">
<select name="rol" class="form-select">
<option value="admin">Admin</option>
<option value="usuario">Usuario</option>
</select>
</div>

<div class="col-md-1">
<button class="btn btn-primary">Crear</button>
</div>

</form>

<hr>

<table class="table table-striped">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Rol</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for u in usuarios %}
<tr>
<td>{{u.id_usuario}}</td>
<td>{{u.nombre}}</td>
<td>{{u.email}}</td>
<td>{{u.rol}}</td>

<td>
<a class="btn btn-warning btn-sm" href="/usuarios/editar/{{u.id_usuario}}">Editar</a>
<a class="btn btn-danger btn-sm" href="/usuarios/eliminar/{{u.id_usuario}}">Eliminar</a>
</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>


<script>
function toggleSidebar() {

    let sidebar = document.getElementById("sidebar");
    let content = document.getElementById("content");
    let btn = document.getElementById("menuBtn");

    // Activar/desactivar sidebar
    sidebar.classList.toggle("active");
    content.classList.toggle("active");

    // Cambiar icono
    if (sidebar.classList.contains("active")) {
        btn.innerHTML = "✖";
    } else {
        btn.innerHTML = "☰";
    }
}
</script>

</body>
</html>
