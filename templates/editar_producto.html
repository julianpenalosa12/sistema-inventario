<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Producto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}">

<style>
.sidebar {
    height: 100vh;
    width: 250px;
    position: fixed;
    top: 0;
    left: -250px;
    background-color: #212529;
    padding-top: 60px;
    transition: 0.3s;
}

.sidebar a {
    padding: 10px 20px;
    display: block;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background-color: #343a40;
}

.content {
    margin-left: 0;
    transition: 0.3s;
    padding: 20px;
}

.sidebar.active {
    left: 0;
}

.content.active {
    margin-left: 250px;
}
</style>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <button id="menuBtn" class="btn btn-outline-light" onclick="toggleSidebar()">☰</button>

        <span class="navbar-brand">SIWI</span>

        <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>

    </div>
</nav>



<!-- CONTENIDO -->
<div id="content" class="content">

<div class="container mt-5">

<div class="card shadow">
<div class="card-header bg-warning">
<h4>Editar Producto</h4>
</div>

<div class="card-body">

<form action="/productos/actualizar/{{producto.id_producto}}" method="POST">

<div class="mb-3">
<label>Nombre</label>
<input type="text" name="nombre" class="form-control" value="{{producto.nombre}}" required>
</div>

<div class="mb-3">
<label>Descripción</label>
<input type="text" name="descripcion" class="form-control" value="{{producto.descripcion}}">
</div>

<div class="mb-3">
<label>Precio</label>
<input type="number" name="precio" class="form-control" value="{{producto.precio}}" required>
</div>

<div class="mb-3">
<label>Stock</label>
<input type="number" name="stock" class="form-control" value="{{producto.stock}}" required>
</div>

<div class="mb-3">
<label>Categoría</label>
<select name="id_categoria" class="form-select">

{% for c in categorias %}
<option value="{{c.id_categoria}}"
{% if producto.id_categoria == c.id_categoria %}selected{% endif %}>
{{c.nombre}}
</option>
{% endfor %}

</select>
</div>

<div class="d-flex justify-content-between">
<a href="/productos" class="btn btn-secondary">Volver</a>
<button class="btn btn-success">Guardar cambios</button>
</div>

</form>

</div>
</div>

</div>

</div>

<script>
function toggleSidebar() {
    let sidebar = document.getElementById("sidebar");
    let content = document.getElementById("content");
    let btn = document.getElementById("menuBtn");

    sidebar.classList.toggle("active");
    content.classList.toggle("active");

    btn.innerHTML = sidebar.classList.contains("active") ? "✖" : "☰";
}
</script>

</body>
</html>
