<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Categoría</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4 class="mb-0">Editar Categoría</h4>
</div>

<div class="card-body">

<form action="/categorias/actualizar/{{categoria.id_categoria}}" method="POST">

<div class="mb-3">
<label class="form-label">Nombre</label>
<input type="text" name="nombre" class="form-control" value="{{categoria.nombre}}" required>
</div>

<div class="mb-3">
<label class="form-label">Descripción</label>
<input type="text" name="descripcion" class="form-control" value="{{categoria.descripcion}}">
</div>

<div class="d-flex justify-content-between">

<a href="/categorias" class="btn btn-secondary">
Volver
</a>

<button class="btn btn-success">
Guardar cambios
</button>

</div>

</form>

</div>

</div>

</div>
</div>

</div>

</body>
</html>
